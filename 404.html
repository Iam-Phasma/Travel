<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | CTAA</title>
    <link rel="icon" type="image/webp" href="assets/CHED-Logo.webp">

    <!-- Dynamically resolve the correct base path so all relative asset
         URLs work whether the 404 is triggered from a root or sub-directory path. -->
    <base id="base-tag" href="/">
    <script>
        (function () {
            var base = document.getElementById('base-tag');
            if (location.host === 'iam-phasma.github.io') {
                base.href = 'https://iam-phasma.github.io/Travel-Authority-Archive/';
            } else {
                base.href = location.origin + '/';
            }
        })();
    </script>

    <link rel="stylesheet" href="styles.css?v=20260321-3">
    <link rel="stylesheet" href="header/header.css?v=20260321-3">
    <link rel="stylesheet" href="footer/footer.css?v=20260321-3">

    <style>
        body.login-page {
            background-color: #ffffff !important;
        }

        body.login-page::before {
            background-image: none !important;
            opacity: 0 !important;
        }

        main {
            width: 100%;
            display: flex;
            flex: 1 0 auto;
            background: #ffffff;
        }

        /* ── 404 section ── */
        .not-found-section {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 0;
            flex: 1;
            width: 100%;
            margin: 0;
            padding: 0 18px 0;
            text-align: center;
            background: #ffffff;
            overflow: hidden;
        }

        .not-found-section::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background: none;
            pointer-events: none;
        }

        .not-found-section::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: clamp(90px, 17vh, 150px);
            z-index: 0;
            background: none;
            pointer-events: none;
        }

        .not-found-facade {
            position: relative;
            width: min(900px, 74%);
            margin-top: 0;
            pointer-events: none;
            opacity: 1;
            filter: grayscale(0.15) contrast(1.02);
        }

        .not-found-facade img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            object-position: bottom center;
        }

        .not-found-content {
            position: relative;
            z-index: 2;
            display: grid;
            gap: 12px;
            justify-items: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .not-found-code {
            position: relative;
            z-index: 1;
            font-size: clamp(4.8rem, 16vw, 11rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1;
            color: rgba(11, 28, 59, 0.9);
            text-shadow:
                0 8px 24px rgba(12, 30, 61, 0.14);
        }

        .not-found-content {
            text-align: center;
        }

        .not-found-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ink);
            margin: 0;
        }

        .not-found-desc {
            font-size: 0.9rem;
            color: rgba(11, 28, 59, 0.68);
            max-width: 420px;
            line-height: 1.5;
            margin: 0;
        }

        .not-found-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--sea);
            color: var(--mist);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 150ms ease, color 150ms ease;
        }

        .not-found-home-btn:hover,
        .not-found-home-btn:focus {
            background: var(--hover-sea);
        }

        .not-found-home-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--mist);
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .not-found-facade {
                width: min(720px, 58%);
            }
        }

        @media (max-width: 640px) {
            .not-found-section {
                gap: 0;
                padding: 0 14px 0;
            }

            .not-found-code {
                font-size: clamp(4rem, 24vw, 7rem);
            }

            .not-found-facade {
                width: 100%;
                 opacity: 1;
            }

            .not-found-title {
                font-size: 1.32rem;
            }

            .not-found-desc {
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body class="login-page">

    <!-- ── Header ── -->
    <header class="login-hero-header">
        <div class="login-header-bar">
            <p class="login-header-kicker">CHEDRO IV</p>
        </div>
        <div class="login-header-copy">
            <h1>Travel Authority Archive</h1>
        </div>
    </header>

    <!-- ── 404 Content ── -->
    <main>
        <section class="not-found-section">
            <div class="not-found-content">
                <div class="not-found-code" aria-hidden="true">404</div>
                <h2 class="not-found-title">Page Not Found</h2>
                <p class="not-found-desc">
                    The page you are looking for was moved, removed, renamed,
                    or might have never existed.
                </p>

                <a href="index.html" class="not-found-home-btn">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    Return
                </a>
            </div>

            <div class="not-found-facade" aria-hidden="true">
                <img src="assets/facade-sketch.webp" alt="">
            </div>
        </section>
    </main>

    <!-- ── Footer ── -->
    <footer class="gov-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="footer-brand-lockup" aria-hidden="true">
                    <img src="assets/CHED-Logo.webp" alt="CHED logo" class="footer-logo">
                    <img src="assets/Bagong_Pilipinas_logo.webp" alt="Bagong Pilipinas logo" class="footer-logo footer-logo--secondary">
                </div>
                <div class="footer-brand-copy">
                    <h3>Travel Authority Archive</h3>
                </div>
            </div>
            <div class="footer-links" aria-label="Official links">
                <a href="https://ched.gov.ph/" target="_blank" rel="noopener noreferrer">CHED Website</a>
                <a href="https://www.facebook.com/ched4" target="_blank" rel="noopener noreferrer">CHEDRO IV Facebook</a>
            </div>
            <div class="footer-note">
                <p class="footer-copyright">© 2026 Commission on Higher Education.</p>
            </div>
        </div>
    </footer>

</body>
</html>
