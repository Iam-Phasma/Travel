        // ============================================

        // Initialize and check permissions
        (async () => {
            const userRole = await requireAdmin();
            if (!userRole) return; // Redirected to login or dashboard
            window.adminCurrentRole = userRole;
            window.dispatchEvent(new CustomEvent('admin-role-ready', { detail: { role: userRole } }));
            
            // Start activity-driven global heartbeat for current user
            // This avoids marking idle users as online when no real interaction happens.
            const HEARTBEAT_THROTTLE_MS = 30000;
            let lastHeartbeatAt = 0;

            const updateHeartbeat = async (force = false) => {
                const now = Date.now();
                if (!force && now - lastHeartbeatAt < HEARTBEAT_THROTTLE_MS) {
                    return;
                }

                lastHeartbeatAt = now;

                try {
                    const { data, error } = await supabase.rpc('update_last_seen');
                    if (error) {
                        console.warn('Heartbeat error:', error.message);
                    } else {
                        // Heartbeat updated
                    }
                } catch (error) {
                    // Heartbeat update skipped
                }
            };

            const activityEvents = ['click', 'keydown', 'touchstart', 'wheel', 'scroll', 'mousedown'];
            const onActivity = () => {
                if (document.visibilityState !== 'visible') {
                    return;
                }
                updateHeartbeat();
            };

            activityEvents.forEach((eventName) => {
                document.addEventListener(eventName, onActivity, { passive: true });
            });

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    updateHeartbeat(true);
                }
            });

            window.addEventListener('focus', () => {
                updateHeartbeat(true);
            });

            // Initial heartbeat on page load
            updateHeartbeat(true);
            
            // Show User Management panel only for super users
            if (userRole === 'super') {
                // Wait for users panel to load before setting up
                usersPanelLoaded.then(async () => {
                    const usersPanelBtn = document.getElementById('users-panel-btn');
                    if (usersPanelBtn) {
                        usersPanelBtn.classList.remove('hidden');
                        // Restore users-panel if it was the last active panel
                        if (localStorage.getItem('adminActivePanel') === 'users-panel') {
                            usersPanelBtn.click();
                        }
                    }
                    // Load users for the User Management panel
                    await loadUsers();
                    
                    // Start auto-refresh for user management panel (every 10 seconds)
                    let userRefreshInterval = null;
                    
                    // Set up interval to refresh users table when panel is visible
                    const startUserRefresh = () => {
                        if (userRefreshInterval) return; // Already running
                        
                        userRefreshInterval = setInterval(async () => {
                            // Only refresh if users panel is visible
                            const usersPanel = document.getElementById('users-panel');
                            if (usersPanel && !usersPanel.classList.contains('hidden')) {
                                await loadUsers();
                            }
                        }, 10000); // 10 seconds
                    };
                    
                    const stopUserRefresh = () => {
                        if (userRefreshInterval) {
                            clearInterval(userRefreshInterval);
                            userRefreshInterval = null;
                        }
                    };
                    
                    // Monitor panel visibility
                    const panelSwitchers = document.querySelectorAll('.switch-btn');
                    panelSwitchers.forEach(btn => {
                        btn.addEventListener('click', () => {
                            const targetPanel = btn.getAttribute('data-panel');
                            if (targetPanel === 'users-panel') {
                                startUserRefresh();
                            } else {
                                stopUserRefresh();
                            }
                        });
                    });
                    
                    // Always start the auto-refresh interval for super users
                    // The interval itself checks panel visibility before making network calls
                    startUserRefresh();
                });
            }
        })();
        
        // loadEmployees() is now called in uploadPanelLoaded.then() to ensure proper initialization
        // Note: loadAdminEmployeesForFilter() is called inside viewPanelLoaded.then() where it's defined

        // Preload travel authorities data in the background for faster first load
        Promise.all([employeePanelLoaded, usersPanelLoaded, uploadPanelLoaded]).then(() => {
            // Preload data if not already loaded
            if (viewRows.length === 0) {
                loadTravelAuthorities(true).catch(err => {
                    console.log("Background preload of travel authorities failed:", err);
                });
            }
        });

        // Restore last active panel (wait for panels to load first)
        Promise.all([viewPanelLoaded, employeePanelLoaded, usersPanelLoaded, uploadPanelLoaded]).then(() => {
            const savedPanel = localStorage.getItem("adminActivePanel");
            if (!savedPanel || savedPanel === "upload-panel") return;
            const targetBtn = document.querySelector(`.switch-btn[data-panel="${savedPanel}"]`);
            if (!targetBtn || targetBtn.classList.contains("hidden")) return;
            targetBtn.click();
        });

        let lastScannedOrphanPaths = [];

        const extractStoragePathFromFileUrl = (fileUrl) => {
            if (!fileUrl) return null;
            try {
                const parsed = new URL(fileUrl);
                const marker = '/ta-files/';
                const markerIndex = parsed.pathname.indexOf(marker);
                if (markerIndex < 0) return null;
                return decodeURIComponent(parsed.pathname.slice(markerIndex + marker.length));
            } catch (error) {
                return null;
            }
        };

        const fetchReferencedStoragePaths = async () => {
            const pageSize = 1000;
            let from = 0;
            const referenced = new Set();

            while (true) {
                const { data, error } = await supabase
                    .from('travel_authorities')
                    .select('file_url')
                    .range(from, from + pageSize - 1);

                if (error) {
                    throw new Error(`Failed to read records: ${error.message || 'Unknown error'}`);
                }

                if (!data || data.length === 0) break;

                data.forEach((row) => {
                    const path = extractStoragePathFromFileUrl(row.file_url);
                    if (path) referenced.add(path);
                });

                if (data.length < pageSize) break;
                from += pageSize;
            }

            return referenced;
        };

        const listStoragePathsRecursive = async () => {
            const storage = supabase.storage.from('ta-files');
            const files = [];

            const walk = async (prefix = '') => {
                const pageSize = 100;
                let offset = 0;

                while (true) {
                    const { data, error } = await storage.list(prefix, {
                        limit: pageSize,
                        offset,
                        sortBy: { column: 'name', order: 'asc' }
                    });

                    if (error) {
                        throw new Error(`Failed listing storage at ${prefix || '/'}: ${error.message || 'Unknown error'}`);
                    }

                    if (!data || data.length === 0) break;

                    for (const item of data) {
                        const fullPath = prefix ? `${prefix}/${item.name}` : item.name;
                        const isFolder = !item.id;
                        if (isFolder) {
                            await walk(fullPath);
                        } else {
                            files.push(fullPath);
                        }
                    }

                    if (data.length < pageSize) break;
                    offset += pageSize;
                }
            };

            await walk('');
            return files;
        };

        const scanOrphanStorageFiles = async () => {
            const [referencedPaths, storedPaths] = await Promise.all([
                fetchReferencedStoragePaths(),
                listStoragePathsRecursive()
            ]);

            const orphanPaths = storedPaths.filter((path) => !referencedPaths.has(path)).sort();
            lastScannedOrphanPaths = orphanPaths;

            return {
                orphanPaths,
                counts: {
                    stored: storedPaths.length,
                    referenced: referencedPaths.size
                }
            };
        };

        const deleteOrphanStorageFiles = async () => {
            if (!lastScannedOrphanPaths.length) {
                return { deleted: 0, remaining: 0 };
            }

            const storage = supabase.storage.from('ta-files');
            const batchSize = 100;
            let deleted = 0;

            for (let i = 0; i < lastScannedOrphanPaths.length; i += batchSize) {
                const batch = lastScannedOrphanPaths.slice(i, i + batchSize);
                const { error } = await storage.remove(batch);
                if (error) {
                    throw new Error(`Failed deleting orphan files: ${error.message || 'Unknown error'}`);
                }
                deleted += batch.length;
            }

            lastScannedOrphanPaths = [];
            return { deleted, remaining: 0 };
        };

        window.adminOrphanFiles = {
            scan: scanOrphanStorageFiles,
            deleteScanned: deleteOrphanStorageFiles,
            getLastScan: () => lastScannedOrphanPaths.slice()
        };

        // Prevent browser back/forward navigation
        // This prevents users from accidentally navigating back to login or other pages
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', () => {
            history.pushState(null, null, location.href);
        });

        // Force page reload if loaded from cache (back/forward button)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                window.location.reload();
            }
        });

        // Initialize header buttons after everything is defined
        // This will be called either from here or from the header loader,
        // whichever happens last (after both script and HTML are ready)
        if (window.headerLoaded) {
            window.initHeaderButtons();
        }
        // If header hasn't loaded yet, the header loader will call it

    </script>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Settings</h3>
            <div class="settings-list">
                <div class="settings-section">
                    <label class="checkbox-label settings-item">
                        <input type="checkbox" id="settings-show-demo-checkbox" checked>
                        <span>Show demo file checkbox in upload and edit forms</span>
                    </label>
                </div>
                <div class="settings-section settings-section--orphan-tools" id="settings-orphan-tools-section" style="display: none;">
                    <div class="settings-action-row">
                        <button class="modal-btn settings-btn-primary" id="settings-scan-orphans" type="button">Scan Orphan Files</button>
                        <button class="modal-btn cancel" id="settings-delete-orphans" type="button" style="display: none;">Delete Orphans</button>
                    </div>
                    <p id="settings-orphan-status" class="status settings-orphan-status">Run scan to find files in storage that are no longer referenced by records.</p>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="close-settings">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Demo checkbox visibility setting
        const DEMO_CHECKBOX_SETTING_KEY = 'adminShowDemoCheckbox';

        const getDemoCheckboxVisible = () => {
            const saved = localStorage.getItem(DEMO_CHECKBOX_SETTING_KEY);
            return saved === null ? true : saved === 'true';
        };
        window.getDemoCheckboxVisible = getDemoCheckboxVisible;

        window.applyDemoCheckboxVisibility = (visible) => {
            // Upload panel demo checkbox wrapper
            const uploadDemoWrapper = document.getElementById('is-demo-checkbox')?.closest('.demo-field-wrapper');
            if (uploadDemoWrapper) {
                uploadDemoWrapper.style.display = visible ? '' : 'none';
            }
            // Edit modal demo checkbox wrapper
            const editDemoWrapper = document.getElementById('update-is-demo-checkbox')?.closest('.demo-field-wrapper');
            if (editDemoWrapper) {
                editDemoWrapper.style.display = visible ? '' : 'none';
            }
        };

        const settingsShowDemoCheckbox = document.getElementById('settings-show-demo-checkbox');
        const settingsOrphanToolsSection = document.getElementById('settings-orphan-tools-section');
        const settingsScanOrphansBtn = document.getElementById('settings-scan-orphans');
        const settingsDeleteOrphansBtn = document.getElementById('settings-delete-orphans');
        const settingsOrphanStatus = document.getElementById('settings-orphan-status');

        const applyOrphanToolsVisibilityByRole = (role) => {
            if (!settingsOrphanToolsSection) return;
            settingsOrphanToolsSection.style.display = role === 'super' ? '' : 'none';
        };

        applyOrphanToolsVisibilityByRole(window.adminCurrentRole || '');
        window.addEventListener('admin-role-ready', (event) => {
            applyOrphanToolsVisibilityByRole(event?.detail?.role || '');
        });

        // Load saved setting (default: true = visible)
        settingsShowDemoCheckbox.checked = getDemoCheckboxVisible();

        settingsShowDemoCheckbox.addEventListener('change', () => {
            const visible = settingsShowDemoCheckbox.checked;
            localStorage.setItem(DEMO_CHECKBOX_SETTING_KEY, visible);
            window.applyDemoCheckboxVisibility(visible);
        });

        if (settingsScanOrphansBtn && settingsDeleteOrphansBtn && settingsOrphanStatus) {
            const setDeleteBtnVisible = (visible) => {
                settingsDeleteOrphansBtn.style.display = visible ? '' : 'none';
                if (!visible) settingsDeleteOrphansBtn.disabled = true;
            };

            const setOrphanBusy = (busy) => {
                settingsScanOrphansBtn.disabled = busy;
                if (busy) settingsDeleteOrphansBtn.disabled = true;
            };

            setDeleteBtnVisible(false);

            settingsScanOrphansBtn.addEventListener('click', async () => {
                if (!window.adminOrphanFiles?.scan) {
                    settingsOrphanStatus.textContent = 'Cleanup tools not ready yet. Please try again in a moment.';
                    return;
                }

                setOrphanBusy(true);
                settingsOrphanStatus.textContent = 'Scanning storage for orphan files...';

                try {
                    const result = await window.adminOrphanFiles.scan();
                    const orphanCount = result.orphanPaths.length;
                    if (orphanCount === 0) {
                        setDeleteBtnVisible(false);
                        settingsOrphanStatus.textContent = `No orphan files found. Stored: ${result.counts.stored}, Referenced: ${result.counts.referenced}.`;
                        if (window.showToast) window.showToast('No orphan files found.', 'success');
                    } else {
                        setDeleteBtnVisible(true);
                        settingsDeleteOrphansBtn.disabled = false;
                        settingsOrphanStatus.textContent = `Found ${orphanCount} orphan file(s). Stored: ${result.counts.stored}, Referenced: ${result.counts.referenced}. Click Delete Orphans to remove.`;
                        console.table(result.orphanPaths.map((path, i) => ({ '#': i + 1, path })));
                        if (window.showToast) window.showToast(`Found ${orphanCount} orphan file(s).`, 'warning', 4000);
                    }
                } catch (error) {
                    setDeleteBtnVisible(false);
                    settingsOrphanStatus.textContent = `Scan failed: ${error.message || 'Unknown error'}`;
                    if (window.showToast) window.showToast('Failed to scan orphan files.', 'error');
                } finally {
                    setOrphanBusy(false);
                }
            });

            settingsDeleteOrphansBtn.addEventListener('click', async () => {
                if (!window.adminOrphanFiles?.deleteScanned) {
                    settingsOrphanStatus.textContent = 'Cleanup tools not ready yet. Please try again in a moment.';
                    return;
                }

                const orphanList = window.adminOrphanFiles.getLastScan ? window.adminOrphanFiles.getLastScan() : [];
                if (!orphanList.length) {
                    setDeleteBtnVisible(false);
                    settingsOrphanStatus.textContent = 'No scanned orphan list available. Run scan first.';
                    return;
                }

                const confirmationFn = window.adminShowConfirmation;
                let confirmed = true;
                if (typeof confirmationFn === 'function') {
                    confirmed = await confirmationFn(
                        'Delete Orphan Files',
                        `Delete ${orphanList.length} orphan file(s) from storage? This action cannot be undone.`
                    );
                }

                if (!confirmed) return;

                setOrphanBusy(true);
                settingsOrphanStatus.textContent = `Deleting ${orphanList.length} orphan file(s)...`;

                try {
                    const result = await window.adminOrphanFiles.deleteScanned();
                    setDeleteBtnVisible(false);
                    settingsOrphanStatus.textContent = `Deleted ${result.deleted} orphan file(s).`;
                    if (window.showToast) window.showToast(`Deleted ${result.deleted} orphan file(s).`, 'success');
                } catch (error) {
                    settingsOrphanStatus.textContent = `Delete failed: ${error.message || 'Unknown error'}`;
                    if (window.showToast) window.showToast('Failed to delete orphan files.', 'error');
                } finally {
                    setOrphanBusy(false);
                }
            });
        }

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.remove('show');
        });

        document.getElementById('settings-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('settings-modal')) {
                document.getElementById('settings-modal').classList.remove('show');
            }
        });
    </script>

    <div id="footer-container"></div>
    <script>
        fetch('../footer/footer.html')
            .then(response => response.text())
            .then(data => {
                const footerHTML = data.replace(/FOOTER_ASSETS_PATH/g, '../assets');
                document.getElementById('footer-container').innerHTML = footerHTML;
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>

</body>
