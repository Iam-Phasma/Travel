<header class="sticky-header">
    <div class="sticky-header-content">
        <div class="sticky-header-left">
            <div class="sticky-header-logos" aria-hidden="true">
                <img src="HEADER_ASSETS_PATH/CHED-Logo.png" alt="CHED Logo" class="sticky-header-logo">
                <img src="HEADER_ASSETS_PATH/Bagong_Pilipinas_logo.png" alt="Bagong Pilipinas logo" class="sticky-header-logo sticky-header-logo--secondary">
            </div>
            <div class="sticky-header-title-wrapper">
                <h1 class="sticky-header-title">
                    <span class="title-full">CHEDRO IV Travel Authority Archive</span>
                    <span class="title-abbr">CTAA</span>
                </h1>
                <p class="header-date" id="header-date"></p>
            </div>
        </div>
        <div class="sticky-header-actions">
            <button id="user-menu-btn" type="button" class="header-user-btn" title="User Menu">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false" class="user-icon">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span id="header-user-name" class="header-user-name">Loading...</span>
            </button>
            <div id="header-popup-panel" class="header-popup-panel">
                <div class="header-popup-content">
                    <div class="header-popup-user-info">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                        <span id="header-user-email" class="header-user-email">Loading...</span>
                    </div>
                    <div class="header-popup-divider"></div>
                    <button id="header-security-doc-option" class="header-popup-option" type="button" hidden>
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M12 6.5C10.2 5.5 8.1 5 6 5H3v14h3c2.1 0 4.2.5 6 1.5 1.8-1 3.9-1.5 6-1.5h3V5h-3c-2.1 0-4.2.5-6 1.5ZM11 18.1c-1.4-.6-3-1.1-4.6-1.1H5V7h1.4c1.6 0 3.2.4 4.6 1.1v10Zm2 0V8.1c1.4-.7 3-1.1 4.6-1.1H19v10h-1.4c-1.6 0-3.2.5-4.6 1.1Z"/>
                        </svg>
                        <span>Documentation</span>
                    </button>
                    <button id="header-draft-ta-option" class="header-popup-option" type="button" aria-controls="header-draft-ta-modal">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-5-5Zm0 2.5L16.5 7H14V4.5ZM9 11h6a1 1 0 1 1 0 2H9a1 1 0 0 1 0-2Zm0 4h6a1 1 0 1 1 0 2H9a1 1 0 0 1 0-2Zm8.71-5.04a1 1 0 0 1 0 1.41l-4.96 4.96-2.12.7.71-2.12 4.95-4.95a1 1 0 0 1 1.42 0Z"/>
                        </svg>
                        <span>Draft TA</span>
                    </button>
                    <button id="header-settings-option" class="header-popup-option" type="button">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                        </svg>
                        <span>Settings</span>
                    </button>
                    <button id="header-logout-option" class="header-popup-option" type="button">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                        </svg>
                        <span>Log Out</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<div id="header-draft-ta-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="header-draft-ta-title" aria-describedby="header-draft-ta-description">
    <div class="modal-content modal-form header-draft-ta-modal-content">
        <h3 id="header-draft-ta-title">Draft TA</h3>
        <p id="header-draft-ta-description">Prepare the core travel details below. Draft actions will be wired in the next step.</p>
        <form id="header-draft-ta-form" class="fields header-draft-ta-fields" novalidate>
            <div>
                <label for="header-draft-ta-purpose">Purpose <span class="required">*</span></label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M4 5h16a1 1 0 0 1 1 1v10a3 3 0 0 1-3 3H8a5 5 0 0 1-5-5V6a1 1 0 0 1 1-1Zm1 2v7a3 3 0 0 0 3 3h10a1 1 0 0 0 1-1V7H5Zm3 1h8a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2Zm0 4h6a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2Z" />
                        </svg>
                    </span>
                    <input id="header-draft-ta-purpose" type="text" placeholder="Enter travel purpose" maxlength="1000" autocomplete="off">
                </div>
            </div>
            <div>
                <label for="header-draft-ta-destination">Destination <span class="required">*</span></label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7Zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z" />
                        </svg>
                    </span>
                    <input id="header-draft-ta-destination" type="text" placeholder="Enter destination" maxlength="1000" autocomplete="off">
                </div>
            </div>
            <div>
                <label for="header-draft-ta-officials-search">Officials <span class="required">*</span></label>
                <div class="multiselect-wrapper">
                    <div class="multiselect-display" id="header-draft-ta-officials-display">
                        <span class="multiselect-placeholder">Select officials...</span>
                    </div>
                    <div class="multiselect-dropdown" id="header-draft-ta-officials-dropdown">
                        <div class="multiselect-search-wrapper">
                            <input type="text" class="multiselect-search" id="header-draft-ta-officials-search" placeholder="Search Officials...">
                        </div>
                        <div class="multiselect-options" id="header-draft-ta-officials-options">
                            <!-- Options loaded dynamically -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="field-row">
                <div>
                    <label for="header-draft-ta-travel-date">Travel Date <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                            </svg>
                        </span>
                        <input id="header-draft-ta-travel-date" class="header-draft-ta-date-input" type="date">
                    </div>
                </div>
                <div>
                    <label for="header-draft-ta-travel-end">Travel End</label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                            </svg>
                        </span>
                        <input id="header-draft-ta-travel-end" class="header-draft-ta-date-input" type="date">
                    </div>
                </div>
            </div>
            <div class="header-draft-ta-separator" aria-hidden="true"></div>
            <div class="field-row">
                <div>
                    <label for="header-draft-ta-travel-type">Travel Type</label>
                    <div class="input-wrap">
                        <select id="header-draft-ta-travel-type" class="header-draft-ta-select">
                            <option value="official_business" selected>Official Business</option>
                            <option value="official_time_only">Official Time Only</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="header-draft-ta-funding-option">Funding Option</label>
                    <div class="input-wrap">
                        <select id="header-draft-ta-funding-option" class="header-draft-ta-select">
                            <option value="cash_advance">Cash Advance</option>
                            <option value="reimbursement" selected>Reimbursement</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="field-row">
                <div>
                    <label for="header-draft-ta-date-request">Date Request <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                            </svg>
                        </span>
                        <input id="header-draft-ta-date-request" class="header-draft-ta-date-input" type="date" required>
                    </div>
                </div>
            </div>
            <div class="modal-actions header-draft-ta-actions">
                <button id="header-draft-ta-close" class="modal-btn cancel" type="button">Close</button>
                <button id="header-draft-ta-clear" class="modal-btn cancel" type="button">Clear Fields</button>
                <button id="header-draft-ta-create" class="modal-btn confirm" type="button" style="background: #081430;">Create TA</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Display current date in header
    (function() {
        const dateElement = document.getElementById('header-date');
        if (dateElement) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-US', options);
            dateElement.textContent = `Today is ${formattedDate}`;
        }
    })();
</script>
