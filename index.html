<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTAA</title>
    <link rel="icon" type="image/png" href="assets/CHED-Logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header/header.css">
    <link rel="stylesheet" href="footer/footer.css">
    <!-- hCaptcha Script -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body class="login-page">
    <main class="shell">
        <div id="header-container"></div>

        <section class="panel" id="login-panel">
            <h2>Login</h2>
            <div class="fields">
                <div>
                    <label for="email">Email <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" focusable="false">
                                <path d="M12 12.2c2.4 0 4.4-2 4.4-4.4S14.4 3.4 12 3.4 7.6 5.4 7.6 7.8s2 4.4 4.4 4.4Zm0 2.2c-3.4 0-8.2 1.7-8.2 5.1v1.1h16.4v-1.1c0-3.4-4.8-5.1-8.2-5.1Z" />
                            </svg>
                        </span>
                        <input id="email" type="email" autocomplete="email" placeholder="email">
                    </div>
                </div>
                <div>
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" focusable="false">
                                <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Z" />
                            </svg>
                        </span>
                        <input id="password" type="password" autocomplete="current-password" placeholder="password">
                    </div>
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-password">
                    <span>Show password</span>
                </label>
                <!-- hCaptcha widget for login -->
                <div class="h-captcha" id="login-hcaptcha" data-sitekey="fcc42bc6-e25c-48f2-85ea-497021987410" style="margin-top: 12px;"></div>
                <div class="forgot-password-container">
                    <a href="#" id="forgot-password-link" class="forgot-password-link">Forgot Password?</a>
                </div>
            </div>
            <div class="login-actions">
                <button id="login-btn" type="button">Sign in</button>
                <span class="status status--neutral hidden" id="login-status">Enter your credentials.</span>
            </div>
        </section>

        <!-- New Password Panel (shown when user clicks reset link from email) -->
        <section class="panel hidden" id="new-password-panel">
            <h2>Set New Password</h2>
            <div class="fields">
                <div>
                    <label for="new-password">New Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" focusable="false">
                                <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Z" />
                            </svg>
                        </span>
                        <input id="new-password" type="password" autocomplete="new-password" placeholder="new password">
                    </div>
                </div>
                <div>
                    <label for="confirm-password">Confirm Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <span class="icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" role="img" focusable="false">
                                <path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Z" />
                            </svg>
                        </span>
                        <input id="confirm-password" type="password" autocomplete="new-password" placeholder="confirm password">
                    </div>
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-new-password">
                    <span>Show password</span>
                </label>
            </div>
            <div class="login-actions">
                <button id="update-password-btn" type="button">Update Password</button>
                <span class="status status--neutral hidden" id="update-password-status">Enter your new password.</span>
            </div>
        </section>

        <!-- Password Reset Modal -->
        <div id="reset-password-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset Password</h3>
                    <button class="close-modal" id="close-reset-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <p style="margin-bottom: 16px; color: rgba(15, 26, 31, 0.7); font-size: 0.9rem;">Enter your email address and we'll send you a password reset link.</p>
                    <div>
                        <label for="reset-email">Email <span class="required">*</span></label>
                        <div class="input-wrap">
                            <span class="icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" focusable="false">
                                    <path d="M12 12.2c2.4 0 4.4-2 4.4-4.4S14.4 3.4 12 3.4 7.6 5.4 7.6 7.8s2 4.4 4.4 4.4Zm0 2.2c-3.4 0-8.2 1.7-8.2 5.1v1.1h16.4v-1.1c0-3.4-4.8-5.1-8.2-5.1Z" />
                                </svg>
                            </span>
                            <input id="reset-email" type="email" autocomplete="email" placeholder="email">
                        </div>
                    </div>
                    <!-- hCaptcha container for password reset -->
                    <div id="hcaptcha-container" class="h-captcha" data-sitekey="fcc42bc6-e25c-48f2-85ea-497021987410" style="margin-top: 16px;"></div>
                    <span class="status status--neutral hidden" id="reset-status">Enter your email address.</span>
                </div>
                <div class="modal-footer">
                    <button id="cancel-reset-btn" type="button" class="btn-secondary">Cancel</button>
                    <button id="send-reset-btn" type="button" class="btn-primary">Send Reset Link</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
        import { supabaseConfig } from "./config.js";

        const supabase = createClient(supabaseConfig.url, supabaseConfig.anonKey);

        const loginStatus = document.getElementById("login-status");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("login-btn");
        const loginPanel = document.getElementById("login-panel");
        const newPasswordPanel = document.getElementById("new-password-panel");

        document.getElementById("show-password").addEventListener("change", (e) => {
            passwordInput.type = e.target.checked ? "text" : "password";
        });

        // Show/hide new password
        document.getElementById("show-new-password").addEventListener("change", (e) => {
            const newPasswordInput = document.getElementById("new-password");
            const confirmPasswordInput = document.getElementById("confirm-password");
            const type = e.target.checked ? "text" : "password";
            newPasswordInput.type = type;
            confirmPasswordInput.type = type;
        });

        // Database function to check if user is locked out
        const checkLockoutStatus = async (email) => {
            try {
                const { data, error } = await supabase.rpc('check_login_lockout', {
                    user_email: email
                });

                if (error) {
                    console.error("Error checking lockout:", error);
                    return { locked: false };
                }

                return data;
            } catch (err) {
                console.error("Lockout check failed:", err);
                return { locked: false };
            }
        };

        // Database function to record failed login attempt
        const recordFailedAttempt = async (email) => {
            try {
                const { data, error } = await supabase.rpc('record_failed_login', {
                    user_email: email
                });

                if (error) {
                    console.error("Error recording failed login:", error);
                    return { locked: false };
                }

                return data;
            } catch (err) {
                console.error("Failed to record attempt:", err);
                return { locked: false };
            }
        };

        // Database function to clear login attempts on successful login
        const clearLoginAttempts = async (email) => {
            try {
                await supabase.rpc('clear_failed_login', {
                    user_email: email
                });
            } catch (err) {
                console.error("Failed to clear attempts:", err);
            }
        };

        // Dynamic countdown timer for lockout
        let lockoutCountdownInterval = null;

        const stopLockoutCountdown = () => {
            if (lockoutCountdownInterval) {
                clearInterval(lockoutCountdownInterval);
                lockoutCountdownInterval = null;
            }
        };

        const startLockoutCountdown = async (email) => {
            stopLockoutCountdown(); // Clear any existing countdown

            const updateCountdown = async () => {
                const lockoutStatus = await checkLockoutStatus(email);
                
                if (!lockoutStatus.locked) {
                    // Lockout expired
                    stopLockoutCountdown();
                    loginStatus.textContent = "You can now try logging in again.";
                    loginStatus.classList.remove("status--error", "hidden");
                    loginStatus.classList.add("status--success");
                    setTimeout(() => {
                        loginStatus.classList.add("hidden");
                    }, 3000);
                    return;
                }

                // Update timer display
                const remaining = lockoutStatus.seconds_remaining || 0;
                loginStatus.textContent = `Too many failed attempts. Try again in ${remaining} second${remaining !== 1 ? 's' : ''}.`;
                loginStatus.classList.remove("status--success", "hidden");
                loginStatus.classList.add("status--error");
            };

            // Initial update
            await updateCountdown();
            
            // Update every second
            lockoutCountdownInterval = setInterval(updateCountdown, 1000);
        };

        // Clean up countdown on page unload
        window.addEventListener("beforeunload", stopLockoutCountdown);

        const getRedirectPage = async (userId) => {
            try {
                const { data, error } = await supabase
                    .from("profiles")
                    .select("role, access_enabled")
                    .eq("id", userId)
                    .maybeSingle();

                if (error) {
                    throw error;
                }

                // Check if user has access enabled
                if (data?.access_enabled === false) {
                    // User account is disabled
                    await supabase.auth.signOut();
                    throw new Error("Your account access has been disabled. Please contact an administrator to regain access.");
                }

                // Role-based redirect is for UX only. 
                // Real access control is enforced by Supabase RLS policies.
                const role = data?.role || "user";
                
                // Redirect admin and super users to admin panel, regular users to dashboard
                const page = (role === "admin" || role === "super") ? "admin/admin.html" : "dashboard/dashboard.html";
                
                return { role, page };
            } catch (error) {
                console.error("Error fetching user role:", error);
                // Re-throw error if it's about access being disabled
                if (error.message && error.message.includes("disabled")) {
                    throw error;
                }
                // Default to dashboard if role lookup fails
                return { role: "user", page: "dashboard/dashboard.html" };
            }
        };

        const handleLogin = async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                loginStatus.textContent = "Please enter email and password.";
                loginStatus.classList.remove("status--success", "hidden");
                loginStatus.classList.add("status--error");
                loginStatus.classList.remove("status--shake");
                void loginStatus.offsetWidth;
                loginStatus.classList.add("status--shake");
                return;
            }

            // Verify hCaptcha from the login widget
            // Use getResponse() without parameters - it gets the response from the visible widget
            const hcaptchaResponse = hcaptcha.getResponse();
            console.log('Login hCaptcha response:', hcaptchaResponse ? 'Token received' : 'No token'); // Debug
            if (!hcaptchaResponse) {
                loginStatus.textContent = "Please complete the CAPTCHA verification.";
                loginStatus.classList.remove("status--success", "hidden");
                loginStatus.classList.add("status--error");
                loginStatus.classList.remove("status--shake");
                void loginStatus.offsetWidth;
                loginStatus.classList.add("status--shake");
                return;
            }

            // Check lockout status from DATABASE (cannot be bypassed)
            const lockoutStatus = await checkLockoutStatus(email);
            if (lockoutStatus.locked) {
                // Start dynamic countdown
                startLockoutCountdown(email);
                return;
            }

            loginStatus.textContent = "Signing in...";
            loginStatus.classList.remove("status--error", "status--success", "hidden");

            try {
                // Pass captcha token to Supabase for verification
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password,
                    options: {
                        captchaToken: hcaptchaResponse
                    }
                });

                console.log('Supabase login response:', { data, error }); // Debug

                if (error) {
                    throw error;
                }

                const user = data?.user;
                if (!user) {
                    throw new Error("Unable to load user session.");
                }

                // SUCCESS - Clear failed attempts from DATABASE
                await clearLoginAttempts(email);

                // Reset hCaptcha after successful login
                hcaptcha.reset();

                const { role, page } = await getRedirectPage(user.id);
                
                loginStatus.textContent = "Signed in. Redirecting...";
                loginStatus.classList.remove("hidden");
                loginStatus.classList.add("status--success");

                // For admin and super users, generate and store a session token to enforce single-session
                if (role === "admin" || role === "super") {
                    const sessionToken = crypto.randomUUID();
                    localStorage.setItem('admin_session_token', sessionToken);
                    
                    // Wait for database update to complete before redirecting
                    const { error: updateError } = await supabase
                        .from("profiles")
                        .update({ session_token: sessionToken })
                        .eq("id", user.id);
                    
                    if (updateError) {
                        console.error("Failed to update session token:", updateError);
                        loginStatus.textContent = "Warning: Session token update failed. " + updateError.message;
                    }
                    
                    // Add extra delay to ensure database propagation
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                setTimeout(() => {
                    window.location.href = page;
                }, 500);
            } catch (error) {
                const errorMessage = error?.message || "Invalid email or password";

                // Reset hCaptcha after failed login
                hcaptcha.reset();

                // FAILED - Record attempt in DATABASE (cannot be bypassed)
                const attemptResult = await recordFailedAttempt(email);

                if (attemptResult.locked) {
                    // Start dynamic countdown
                    startLockoutCountdown(email);
                } else {
                    const attemptsRemaining = attemptResult.attempts_remaining || 0;
                    // Only show attempts remaining when 5 or fewer attempts left
                    if (attemptsRemaining <= 5) {
                        loginStatus.textContent = `${errorMessage}. ${attemptsRemaining} attempt${attemptsRemaining !== 1 ? 's' : ''} remaining.`;
                    } else {
                        loginStatus.textContent = errorMessage;
                    }
                    loginStatus.classList.remove("status--success", "hidden");
                    loginStatus.classList.add("status--error");
                    loginStatus.classList.remove("status--shake");
                    void loginStatus.offsetWidth;
                    loginStatus.classList.add("status--shake");
                }
            }
        };

        const redirectIfLoggedIn = async () => {
            const { data: sessionData } = await supabase.auth.getSession();
            const user = sessionData?.session?.user;
            if (!user) return;

            const { page } = await getRedirectPage(user.id);
            window.location.href = page;
        };

        loginBtn.addEventListener("click", handleLogin);

        // Trigger login when Enter key is pressed
        emailInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                handleLogin();
            }
        });

        passwordInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                handleLogin();
            }
        });

        // Check if user is in password recovery mode (clicked email link)
        const checkPasswordRecovery = async () => {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const type = hashParams.get('type');
            
            console.log('Full URL:', window.location.href); // Debug log
            console.log('Hash:', window.location.hash); // Debug log
            console.log('Type parameter:', type); // Debug log
            
            if (type === 'recovery') {
                // User clicked the reset link from email - show new password form
                console.log('Recovery mode detected - showing password reset form'); // Debug log
                loginPanel.classList.add('hidden');
                newPasswordPanel.classList.remove('hidden');
                return true;
            }
            return false;
        };

        // Handle new password update
        const handlePasswordUpdate = async () => {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const updatePasswordStatus = document.getElementById('update-password-status');
            const updatePasswordBtn = document.getElementById('update-password-btn');

            if (!newPassword || !confirmPassword) {
                updatePasswordStatus.textContent = 'Please enter and confirm your new password.';
                updatePasswordStatus.classList.remove('status--success', 'hidden');
                updatePasswordStatus.classList.add('status--error');
                return;
            }

            if (newPassword !== confirmPassword) {
                updatePasswordStatus.textContent = 'Passwords do not match.';
                updatePasswordStatus.classList.remove('status--success', 'hidden');
                updatePasswordStatus.classList.add('status--error');
                return;
            }

            if (newPassword.length < 6) {
                updatePasswordStatus.textContent = 'Password must be at least 6 characters long.';
                updatePasswordStatus.classList.remove('status--success', 'hidden');
                updatePasswordStatus.classList.add('status--error');
                return;
            }

            updatePasswordStatus.textContent = 'Updating password...';
            updatePasswordStatus.classList.remove('status--error', 'status--success', 'hidden');
            updatePasswordBtn.disabled = true;

            try {
                // Check if user has a valid session
                const { data: sessionData } = await supabase.auth.getSession();
                console.log('Current session:', sessionData); // Debug log
                
                if (!sessionData?.session) {
                    throw new Error('No active session. Please click the reset link from your email again.');
                }

                // Update the password
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                console.log('Update user response:', data, error); // Debug log

                if (error) {
                    throw error;
                }

                updatePasswordStatus.textContent = 'Password updated! Clearing session...';
                updatePasswordStatus.classList.remove('status--error', 'hidden');
                updatePasswordStatus.classList.add('status--success');

                // Clear any failed login attempts for this user
                const userEmail = sessionData?.session?.user?.email;
                if (userEmail) {
                    console.log('Clearing login attempts for:', userEmail);
                    await clearLoginAttempts(userEmail);
                }

                // Important: Sign out to clear the recovery session completely
                // This ensures the new password takes effect immediately
                const { error: signOutError } = await supabase.auth.signOut();
                
                if (signOutError) {
                    console.error('Sign out error:', signOutError);
                }

                // Clear all local storage and session storage
                localStorage.clear();
                sessionStorage.clear();
                
                updatePasswordStatus.textContent = 'Password updated successfully! Redirecting to login...';
                
                // Always redirect to production URL after password reset
                setTimeout(() => {
                    // Redirect to GitHub Pages for login (works from localhost or production)
                    window.location.replace(supabaseConfig.productionUrl + '/index.html');
                }, 2000);
            } catch (error) {
                console.error('Password update error:', error);
                console.error('Error details:', JSON.stringify(error)); // More detailed error log
                updatePasswordStatus.textContent = error.message || 'Failed to update password. Please try again.';
                updatePasswordStatus.classList.remove('status--success', 'hidden');
                updatePasswordStatus.classList.add('status--error');
                updatePasswordBtn.disabled = false;
            }
        };

        // Add event listener for update password button
        document.getElementById('update-password-btn').addEventListener('click', handlePasswordUpdate);

        // Allow Enter key to update password
        document.getElementById('new-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handlePasswordUpdate();
            }
        });

        document.getElementById('confirm-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handlePasswordUpdate();
            }
        });

        // Initialize - check if in recovery mode first
        const initializePage = async () => {
            const isRecovery = await checkPasswordRecovery();
            if (!isRecovery) {
                // Only check login redirect if not in recovery mode
                await redirectIfLoggedIn();
            }
        };

        initializePage();

        // Listen for auth state changes (helpful for debugging)
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event, session);
            
            // If we get a PASSWORD_RECOVERY event, ensure we show the reset form
            if (event === 'PASSWORD_RECOVERY') {
                console.log('Password recovery event detected');
                loginPanel.classList.add('hidden');
                newPasswordPanel.classList.remove('hidden');
            }
        });

        // Password Reset Functionality
        const resetPasswordModal = document.getElementById('reset-password-modal');
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const closeResetModal = document.getElementById('close-reset-modal');
        const cancelResetBtn = document.getElementById('cancel-reset-btn');
        const sendResetBtn = document.getElementById('send-reset-btn');
        const resetEmailInput = document.getElementById('reset-email');
        const resetStatus = document.getElementById('reset-status');

        // Open reset password modal
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            resetPasswordModal.classList.remove('hidden');
            resetEmailInput.value = emailInput.value; // Pre-fill if email is entered
            resetEmailInput.focus();
            resetStatus.classList.add('hidden');
        });

        // Close modal handlers
        const closeResetPasswordModal = () => {
            resetPasswordModal.classList.add('hidden');
            resetEmailInput.value = '';
            resetStatus.classList.add('hidden');
        };

        closeResetModal.addEventListener('click', closeResetPasswordModal);
        cancelResetBtn.addEventListener('click', closeResetPasswordModal);

        // Close modal when clicking outside
        resetPasswordModal.addEventListener('click', (e) => {
            if (e.target === resetPasswordModal) {
                closeResetPasswordModal();
            }
        });

        // Send password reset email
        sendResetBtn.addEventListener('click', async () => {
            const email = resetEmailInput.value.trim();

            if (!email) {
                resetStatus.textContent = 'Please enter your email address.';
                resetStatus.classList.remove('status--success', 'hidden');
                resetStatus.classList.add('status--error');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                resetStatus.textContent = 'Please enter a valid email address.';
                resetStatus.classList.remove('status--success', 'hidden');
                resetStatus.classList.add('status--error');
                return;
            }

            resetStatus.textContent = 'Sending reset link...';
            resetStatus.classList.remove('status--error', 'status--success', 'hidden');
            sendResetBtn.disabled = true;

            // Verify hCaptcha for password reset
            // Use getResponse() without parameters for the modal's widget
            const hcaptchaResponse = hcaptcha.getResponse();
            console.log('Reset hCaptcha response:', hcaptchaResponse ? 'Token received' : 'No token'); // Debug
            if (!hcaptchaResponse) {
                resetStatus.textContent = 'Please complete the CAPTCHA verification.';
                resetStatus.classList.remove('status--success', 'hidden');
                resetStatus.classList.add('status--error');
                sendResetBtn.disabled = false;
                return;
            }

            try {
                // Auto-detect environment (localhost or production)
                const redirectUrl = supabaseConfig.getRedirectUrl();
                console.log('Password reset redirect URL:', redirectUrl); // Debug log
                
                // Pass captcha token to Supabase for verification
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl,
                    captchaToken: hcaptchaResponse
                });

                if (error) {
                    throw error;
                }

                resetStatus.textContent = 'Password reset link sent! Check your email.';
                resetStatus.classList.remove('status--error', 'hidden');
                resetStatus.classList.add('status--success');

                // Reset hCaptcha
                hcaptcha.reset();

                // Close modal after success
                setTimeout(() => {
                    closeResetPasswordModal();
                }, 3000);
            } catch (error) {
                console.error('Password reset error:', error);
                resetStatus.textContent = error.message || 'Failed to send reset link. Please try again.';
                resetStatus.classList.remove('status--success', 'hidden');
                resetStatus.classList.add('status--error');
                // Reset hCaptcha on error
                hcaptcha.reset();
            } finally {
                sendResetBtn.disabled = false;
            }
        });

        // Allow Enter key to send reset email
        resetEmailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendResetBtn.click();
            }
        });

        // Prevent browser back navigation after logout
        // This prevents users from navigating back to authenticated pages after logging out
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                // Page was loaded from cache (back/forward button)
                window.location.reload();
            }
        });
    </script>

    <div id="header-container"></div>
    <script>
        fetch('header/login-header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <div id="footer-container"></div>
    <script>
        fetch('footer/footer.html')
            .then(response => response.text())
            .then(data => {
                const footerHTML = data.replace(/FOOTER_ASSETS_PATH/g, 'assets');
                document.getElementById('footer-container').innerHTML = footerHTML;
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>

</body>
</html>
